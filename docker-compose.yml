# Pool Buddy — local self-hosted stack.
# All basic settings come from `.env` (copy `.env.example` to `.env`).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poolbuddy}
      POSTGRES_USER: ${POSTGRES_USER:-poolbuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    volumes:
      - pooldata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poolbuddy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      args:
        PORT: ${PORT:-3030}
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3030}
      NODE_ENV: ${NODE_ENV:-production}
      # Built from the POSTGRES_* values above so credentials live in one place.
      DATABASE_URL: postgres://${POSTGRES_USER:-poolbuddy}:${POSTGRES_PASSWORD:-change-me-local-only}@db:5432/${POSTGRES_DB:-poolbuddy}
    ports:
      - "${PORT:-3030}:${PORT:-3030}"
    # Lets the container resolve `host.docker.internal` to the Docker host, so
    # the HA base URL can use that hostname to reach Home Assistant running on
    # the host (e.g. http://host.docker.internal:8123).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pooldata:
